name: pileflow # name of the env

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  - pip:
    # Core PyTorch 
    - torch==2.1.2
    - torchvision==0.16.2

    # Flow matching 
    - torchcfm==1.0.5
    - torchdiffeq==0.2.3      # for dopri5 ODE solver at inference

    # Jet physics 
    - fastjet==3.5.1.3

    # ML / numerics 
    - numpy==1.26.4
    - scipy==1.12.0
    - scikit-learn==1.4.0

    # Plotting 
    - matplotlib==3.8.2
    - corner==2.2.2

    # Utilities 
    - tqdm==4.66.1
    - h5py==3.16.0
    - PyYAML==6.0.1
    - setuptools
    - wheel
